version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "@angular/*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: npm
    directory: "/e2e"
    schedule:
      interval: weekly
