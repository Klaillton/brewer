name: Dependabot Alert Triage

on:
  schedule:
    - cron: "15 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Generate or update triage issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.DEPENDABOT_ALERTS_TOKEN != '' && secrets.DEPENDABOT_ALERTS_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueTitle = "SecurityOps: Dependabot alerts triage";
            const issueLabels = ["security", "dependabot", "triage"];

            function normalizeSeverity(value) {
              const sev = (value || "unknown").toLowerCase();
              if (["critical", "high", "moderate", "medium", "low", "unknown"].includes(sev)) {
                return sev === "moderate" ? "medium" : sev;
              }
              return "unknown";
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } else {
                  throw error;
                }
              }
            }

            await ensureLabel("security", "d73a4a", "Security tracking");
            await ensureLabel("dependabot", "5319e7", "Dependabot related tracking");
            await ensureLabel("triage", "0e8a16", "Operational triage");

            let alerts = [];
            let alertsAccessWarning = null;
            try {
              for (let page = 1; page <= 5; page++) {  // reduced from 10
                const response = await github.request("GET /repos/{owner}/{repo}/dependabot/alerts", {
                  owner,
                  repo,
                  state: "open",
                  per_page: 100,
                  page
                });
                const batch = response.data || [];
                alerts = alerts.concat(batch);
                if (batch.length < 100) break;
              }
            } catch (error) {
              alertsAccessWarning = `Dependabot alerts API indisponivel para o token atual (${error?.status || "n/a"}: ${error?.message || "erro desconhecido"}). Configure um token com escopo de leitura de Dependabot alerts e use-o no workflow para habilitar a coleta completa.`;
              core.warning(alertsAccessWarning);
            }

            const counts = { critical: 0, high: 0, medium: 0, low: 0, unknown: 0 };
            for (const alert of alerts) {
              const sev = normalizeSeverity(alert?.security_vulnerability?.severity);
              counts[sev] = (counts[sev] || 0) + 1;
            }

            // Only Critical + High, max 10 items (much smaller issue body)
            const criticalHigh = alerts
              .filter(a => ["critical", "high"].includes(normalizeSeverity(a?.security_vulnerability?.severity)))
              .sort((a, b) => {
                const order = { critical: 2, high: 1 };
                return (order[normalizeSeverity(b?.security_vulnerability?.severity)] || 0) -
                       (order[normalizeSeverity(a?.security_vulnerability?.severity)] || 0);
              })
              .slice(0, 10);

            const rows = criticalHigh.map((alert) => {
              const severity = normalizeSeverity(alert?.security_vulnerability?.severity);
              const dependency = alert?.dependency?.package?.name || "unknown";
              const advisory = alert?.security_advisory?.ghsa_id || "n/a";
              const url = alert?.html_url || "";
              return `- **${severity.toUpperCase()}** — ${dependency} — [${advisory}](${url})`;
            });

            const now = new Date().toISOString();
            const dashboardUrl = `https://github.com/${owner}/${repo}/security/dependabot`;

            const body = [
              "## SecurityOps Triage Snapshot (auto-updated)",
              "",
              `Updated at: ${now}`,
              "",
              "### Summary",
              `- Total open: **${alerts.length}**  (Critical: **${counts.critical}**, High: **${counts.high}**, Medium: **${counts.medium}**, Low: **${counts.low}**)",
              "",
              ...(alertsAccessWarning ? ["### Aviso", `- ${alertsAccessWarning}`, ""] : []),
              "",
              "### Top Critical/High (max 10)",
              ...(rows.length ? rows : ["- No critical or high alerts at the moment."]),
              "",
              `**Full list + details:** [Dependabot Dashboard](${dashboardUrl})`,
              "",
              "_This issue is managed automatically by the `Dependabot Alert Triage` workflow. It is intentionally kept small to reduce context bloat for agents and humans._"
            ].join("\n");

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: issueLabels.join(","),
              per_page: 50
            });

            const existing = existingIssues.find((i) => i.title === issueTitle);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title: issueTitle,
                body
              });
              core.notice(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels: issueLabels
              });
              core.notice(`Created issue #${created.data.number}`);
            }
