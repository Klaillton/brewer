name: Notify devstack-infra to deploy Brewer

on:
  push:
    branches: [master]
    paths:
      - "Dockerfile"
      - "src/**"
      - "pom.xml"
      - "k8s/**"
      - "scripts/**"
      - ".github/workflows/deploy-to-pi.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  trigger-infra-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: notify-devstack-infra-brewer
      cancel-in-progress: true
    steps:
      - name: Trigger devstack-infra orchestrator workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ github.token }}
          repository: Klaillton/devstack-infra
          event-type: brewer-updated
          client-payload: |
            {
              "source_repository": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}",
              "source_workflow": "${{ github.workflow }}",
              "triggered_by": "${{ github.actor }}"
            }

      - name: Deployment handoff summary
        run: |
          echo "Brewer update dispatched to devstack-infra."
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref:        $GITHUB_REF"
          echo "SHA:        $GITHUB_SHA"
