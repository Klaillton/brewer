services:

  nginx:
    image: nginx:1.27-alpine
    container_name: brewer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://localhost/actuator/health", "--no-check-certificate"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 70s

  db:
    image: mariadb:11.3
    container_name: brewer-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-brewer}
      MARIADB_USER: ${DB_USER:-brewer}
      MARIADB_PASSWORD: ${DB_PASSWORD:-brewer}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: brewer-app
    restart: unless-stopped
    # Porta exposta apenas para acesso direto de debug; o tráfego externo
    # passa pelo Nginx (443 → app:8080). Remova se não precisar de acesso HTTP direto.
    ports:
      - "127.0.0.1:8081:8080"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    environment:
      SPRING_PROFILES_ACTIVE: docker,prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-brewer}
      DB_USER: ${DB_USER:-brewer}
      DB_PASSWORD: ${DB_PASSWORD:-brewer}
      # Configurações opcionais de e-mail
      MAIL_HOST: ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Configurações opcionais de AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      # Observability: envia métricas OTLP para o OTel Collector
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mariadb_data:

networks:
  default:
    name: brewer
