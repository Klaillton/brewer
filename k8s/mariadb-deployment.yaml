apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: brewer
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: brewer
spec:
  replicas: 1
  # Recria o pod antes de destruir o antigo (garante que o PVC não fique preso)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/part-of: brewer
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.3
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: brewer-secrets
                  key: db-root-password
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: brewer-secrets
                  key: db-name
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: brewer-secrets
                  key: db-user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: brewer-secrets
                  key: db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-data
