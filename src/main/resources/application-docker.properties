# ─── Database (MariaDB) ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:brewer}
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USER:brewer}
spring.datasource.password=${DB_PASSWORD:brewer}

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Flyway (cria / migra esquema automaticamente) ───────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── H2 desabilitado em Docker ────────────────────────────────────────────────
spring.h2.console.enabled=false

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─── Mail ─────────────────────────────────────────────────────────────────────
mail.host=${MAIL_HOST:smtp.sendgrid.net}
mail.port=${MAIL_PORT:587}
mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}

# ─── AWS S3 ───────────────────────────────────────────────────────────────────
aws.access.key.id=${AWS_ACCESS_KEY_ID:}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_S3_REGION:us-east-1}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.algaworks.brewer=INFO
# Autenticação: DEBUG expõe eventos de falha de login nos logs (observabilidade)
logging.level.org.springframework.security=DEBUG

# ─── Hardening HTTP / Session ─────────────────────────────────────────────────
server.error.include-message=never
server.error.include-stacktrace=never
server.servlet.session.cookie.http-only=true
# Secure só é ativado automaticamente quando o app está atrás de proxy HTTPS
# (X-Forwarded-Proto: https). Não definir como true fixo: quebra login em HTTP puro.
server.forward-headers-strategy=framework
server.servlet.session.cookie.same-site=lax
server.servlet.session.tracking-modes=cookie

# ─── Observability / Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
# Exporta métricas via OTLP para o OTel Collector (override pela env OTEL_EXPORTER_OTLP_ENDPOINT)
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/metrics
management.otlp.metrics.export.step=30s

# Tracing via OTLP → OTel Collector → Tempo
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/traces
